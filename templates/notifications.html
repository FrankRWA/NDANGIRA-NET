{% extends "base.html" %}
{% block title %}Notifications{% endblock %}
{% block content %}
<div class="container" style="max-width:520px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
    <div class="page-title" style="margin-bottom:0" data-i18n="nav_notifs">Notifications</div>
    <button class="btn" onclick="markAllRead()" data-i18n="mark_all_read">Mark all read</button>
  </div>
  <div class="notif-list" id="notif-list"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
const ICONS = {
  msg:    `<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#185FA5" stroke-width="1.4"><path d="M14 3H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h3l3 3 3-3h3a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1z"/></svg>`,
  house:  `<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#0F6E56" stroke-width="1.4"><path d="M2 6.5 8 2l6 4.5V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6.5z"/></svg>`,
  verify: `<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#185FA5" stroke-width="1.4"><path d="M2 8l4 4 8-8"/></svg>`,
  job:    `<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#854F0B" stroke-width="1.4"><rect x="2" y="6" width="12" height="8" rx="1"/><path d="M5 6V4a3 3 0 0 1 6 0v2"/></svg>`,
  star:   `<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#EF9F27" stroke-width="1.4"><path d="M8 2l1.8 3.6L14 6.4l-3 2.9.7 4.1L8 11.4l-3.7 2 .7-4.1L2 6.4l4.2-.8z"/></svg>`,
};
const BG = {msg:"#E6F1FB", house:"#E1F5EE", verify:"#E6F1FB", job:"#FAEEDA", star:"#FAEEDA"};

async function loadNotifs() {
  const res = await fetch("/api/notifications");
  const notifs = await res.json();
  if (!notifs.length) {
    document.getElementById("notif-list").innerHTML = "<div style='padding:24px;text-align:center;font-size:13px;color:var(--t2)'>No notifications yet.</div>";
    return;
  }
  document.getElementById("notif-list").innerHTML = notifs.map(n => `
    <a class="notif-item${n.unread ? " unread" : ""}"
       href="${n.link || '/'}"
       onclick="markRead(${n.id})"
       style="text-decoration:none;display:flex;cursor:pointer">
      <div class="notif-icon" style="background:${BG[n.icon] || "#E1F5EE"}">${ICONS[n.icon] || ""}</div>
      <div class="notif-content">
        <div class="notif-title">${n.title}</div>
        <div class="notif-sub">${n.sub}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <div class="notif-time">${n.time}</div>
        ${n.unread ? `<span style="width:8px;height:8px;border-radius:50%;background:#1D9E75;display:inline-block"></span>` : ''}
      </div>
    </a>`).join("");
}

async function markRead(id) {
  await fetch(`/api/notifications/${id}/read`, {method:"POST"});
}

async function markAllRead() {
  await fetch("/api/notifications/read-all", {method:"POST"});
  document.querySelectorAll(".notif-item.unread").forEach(e => e.classList.remove("unread"));
  document.querySelectorAll(".notif-item span[style*='border-radius:50%']").forEach(e => e.remove());
  document.getElementById("notif-dot")?.classList.remove("show");
}

loadNotifs();
</script>
{% endblock %}
